name: Auto Sync Fork (With Workflow Permission)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }} # Dùng PAT để có quyền ghi đè workflow
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Sync with Upstream
        run: |
          git remote add upstream https://github.com/j-hc/revanced-magisk-module.git
          git fetch upstream
          
          git checkout ${{ github.ref_name }}
          
          # Merge và ưu tiên lấy thay đổi từ upstream
          git merge upstream/main --no-edit || git merge upstream/master --no-edit
          
          # Đẩy code lên bằng PAT đã config ở bước checkout
          git push origin ${{ github.ref_name }}
          
