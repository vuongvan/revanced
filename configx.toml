parallel-jobs = 1
enable-magisk-update = true

[Black-rv]
enabled = false
app-name = "blaack"
cli-source = "ReVanced/revanced-cli"
build-mode = "apk"
rv-brand = "rv"
patcher-args = "-e 'Theme' -OdarkThemeBackgroundColor=@android:color/black"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube/"
